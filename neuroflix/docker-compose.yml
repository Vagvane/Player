version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: neuroflix-postgres
    environment:
      POSTGRES_USER: neuroflix
      POSTGRES_PASSWORD: neuroflix_dev
      POSTGRES_DB: neuroflix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroflix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (BullMQ)
  redis:
    image: redis:7-alpine
    container_name: neuroflix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuroflix-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://neuroflix:neuroflix_dev@postgres:5432/neuroflix
      JWT_SECRET: dev-secret-change-in-production
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroflix-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
